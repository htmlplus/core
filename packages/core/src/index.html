<!DOCTYPE html>
<html>

<head>
  <title>CORE</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"/>
  <script type="module" src="/build/htmlplus.esm.js"></script>
  <script nomodule src="/build/htmlplus.js"></script>
  <style>
    .menu {
      background: #f3f3f3;
      color: #232323;
      border-radius: 8px;
      font-family: cursive;
    }

    ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }

    ul > li {
      padding: 5px 18px;
      cursor: pointer;
    }

    ul > li:hover {
      border-radius: 8px;
      background: #f3f3f3;
      box-shadow: 5px 3px 8px #cfcfcf,
      0 0 40px #ffffff;
    }
  </style>

</head>

<body>
<plus-menu>
  <div slot="content" class="menu">
    <ul>
      <li>Item one</li>
      <li>Item two</li>
      <li>
        <plus-menu trigger="hover" >
          <span>Item three</span>
          <ul slot="content" class="menu">
            <li>Item one</li>
            <li>Item two</li>
            <li>
              <plus-menu trigger="hover">
                <span>Item three</span>
                <ul slot="content" class="menu">
                  <li>Item one</li>
                  <li>Item two</li>
                  <li>
                    <span>Item three</span>
                  </li>
                </ul>
              </plus-menu>
            </li>
          </ul>
        </plus-menu>
      </li>
    </ul>
  </div>
  <img src="https://i.ytimg.com/vi/OOl8ykqhHkw/maxresdefault.jpg" alt="cover" width="700">
</plus-menu>
</body>

</html>
